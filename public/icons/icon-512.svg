<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0B1219"/>
  <!-- Outer clock ring -->
  <circle cx="256" cy="240" r="160" fill="none" stroke="#3b82f6" stroke-width="18"/>
  <!-- Clock hands -->
  <line x1="256" y1="240" x2="256" y2="112" stroke="#e2e8f0" stroke-width="18" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="340" y2="286" stroke="#60a5fa" stroke-width="14" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="240" r="14" fill="#e2e8f0"/>
  <!-- NYG label -->
  <text x="256" y="438" text-anchor="middle" font-family="-apple-system, sans-serif"
        font-size="52" font-weight="700" fill="#60a5fa" letter-spacing="6">NYG</text>
</svg>
