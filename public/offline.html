<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NYG Time Tracker - Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0B1219;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 600; margin-bottom: 12px; }
    p { color: #94a3b8; font-size: 16px; line-height: 1.6; max-width: 320px; }
    button {
      margin-top: 32px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="icon">⏱️</div>
  <h1>You're offline</h1>
  <p>NYG Time Tracker needs a connection to sync your data. Your cached entries are still available.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
